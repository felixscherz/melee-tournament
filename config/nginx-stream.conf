# nginx config for WebRTC signaling (OvenMediaEngine)
# Place at: /etc/nginx/sites-available/stream-smash.felixscherz.me
# Enable:   ln -s /etc/nginx/sites-available/stream-smash.felixscherz.me /etc/nginx/sites-enabled/
# Cert:     certbot --nginx -d stream-smash.felixscherz.me
#
# NOTE: nginx only proxies the WebSocket signaling (port 443 → 3333).
# WebRTC media travels over UDP directly — open ports 10000-10009/UDP
# in the Hetzner Cloud firewall separately.

server {
    listen 80;
    server_name stream-smash.felixscherz.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    # HTTP/2 must be disabled here — WebSocket upgrade requires HTTP/1.1
    # and nginx cannot upgrade an HTTP/2 connection to WebSocket.
    server_name stream-smash.felixscherz.me;

    ssl_certificate     /etc/letsencrypt/live/stream-smash.felixscherz.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream-smash.felixscherz.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # WebRTC signaling: WSS (browser) → WS (OME on Mac via frp)
    # Upstream is 13333, not 3333: another service (Express) already occupies
    # 3333 on the VM. frp maps this VM-local 13333 → OME's 3333 on the Mac.
    location / {
        proxy_pass         http://127.0.0.1:13333;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;

        # Required for WebRTC — pass the real client IP so OME can
        # include it in ICE candidates
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
