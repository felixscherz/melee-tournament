# frp SERVER config — runs on your Hetzner VM
# Install: apt install frp  OR  download binary from github.com/fatedier/frp
# Run:     frps -c frps.toml
#
# Hetzner firewall: open inbound TCP 7000, 80, 3333, 1935
#                   open inbound UDP 10000-10009

bindAddr = "0.0.0.0"
bindPort = 7000

auth.token = "CHANGE_ME_SECRET"  # Must match frpc.toml

# Optional: frp web dashboard on the VM (port 7500)
# webServer.addr = "0.0.0.0"
# webServer.port = 7500
# webServer.user = "admin"
# webServer.password = "admin"
