<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smash Tournament — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'Courier New', monospace; min-height: 100vh; }

    header {
      background: #1a1a2e;
      padding: 1.2rem 2rem;
      border-bottom: 2px solid #e94560;
      display: flex; align-items: center; gap: 1rem;
    }
    header h1 { font-size: 1.5rem; color: #e94560; letter-spacing: 3px; }

    main { max-width: 640px; margin: 2rem auto; padding: 0 1.5rem; }

    h2 { text-align: center; font-size: 1rem; color: #6060a0; letter-spacing: 2px; margin-bottom: 1.5rem; }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 1.4rem;
      margin-bottom: 1.2rem;
    }

    .phase-row { display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-size: 0.9rem; }
    .phase-label { color: #6060a0; letter-spacing: 1px; }
    #phase-pill {
      padding: 0.25rem 0.9rem; border-radius: 999px; font-weight: bold; letter-spacing: 1px;
      background: #2a2a4a; color: #9090c0; text-transform: uppercase; font-size: 0.78rem;
    }
    #phase-pill.idle     { background: #223322; color: #81c784; }
    #phase-pill.starting { background: #33321a; color: #ffe082; }
    #phase-pill.in_game  { background: #3a1a24; color: #e94560; }
    #phase-pill.postgame { background: #1a2a3a; color: #4fc3f7; }

    .btn {
      width: 100%; padding: 0.85rem 1rem; margin-bottom: 0.9rem;
      border: none; border-radius: 6px;
      font-family: inherit; font-size: 0.95rem; font-weight: bold; letter-spacing: 2px;
      cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-stop    { background: #e94560; color: #fff; }
    .btn-stop:hover:not(:disabled)    { background: #c73352; }
    .btn-restart { background: #4f8fc3; color: #fff; }
    .btn-restart:hover:not(:disabled) { background: #3a7098; }

    .links { display: flex; gap: 0.9rem; }
    .links a {
      flex: 1; text-align: center; text-decoration: none;
      padding: 0.65rem 1rem; border-radius: 6px;
      background: #2a2a4a; color: #9090c0;
      font-size: 0.82rem; letter-spacing: 1px; transition: background 0.2s;
    }
    .links a:hover { background: #35355a; color: #c0c0e0; }

    #status { text-align: center; margin-top: 0.4rem; font-size: 0.82rem; color: #6060a0; min-height: 1.2rem; }
    #status.ok  { color: #81c784; }
    #status.err { color: #e94560; }
  </style>
</head>
<body>
<header>
  <h1>⚔ ADMIN</h1>
</header>
<main>
  <h2>MATCH CONTROL</h2>

  <div class="card">
    <div class="phase-row">
      <span class="phase-label">CURRENT PHASE</span>
      <span id="phase-pill" class="idle">—</span>
    </div>
  </div>

  <div class="card">
    <button class="btn btn-stop" id="stop-btn" onclick="stopMatch()">END MATCH &amp; RETURN TO LOBBY</button>
    <div class="links">
      <a href="/lobby">LOBBY</a>
      <a href="/watch">WATCH</a>
    </div>
  </div>

  <div id="status"></div>
</main>

<script>
const statusEl  = document.getElementById('status');
const pill      = document.getElementById('phase-pill');
const stopBtn   = document.getElementById('stop-btn');

function setStatus(msg, cls = '') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

async function refreshPhase() {
  try {
    const s = await fetch('/api/state').then(r => r.json());
    const phase = s.phase || 'idle';
    pill.textContent = phase;
    pill.className = phase;
    const idle = phase === 'idle';
    stopBtn.disabled = idle;   // nothing to stop when idle
  } catch (e) {
    pill.textContent = 'unreachable';
    pill.className = '';
  }
}
refreshPhase();
setInterval(refreshPhase, 2000);

async function stopMatch() {
  stopBtn.disabled = true;
  // Offline Melee has no quit, so ending a live match makes the bots clear the
  // stage until the game ends on its own — that takes a few seconds.
  setStatus('Ending match — bots are clearing the stage, back to the lobby shortly...', '');
  try {
    const res = await fetch('/api/stop', { method: 'POST' });
    if (!res.ok) throw new Error((await res.json()).detail || 'Error');
    setStatus('Match ending — lobby will be ready once the game wraps up.', 'ok');
  } catch (e) {
    setStatus(e.message, 'err');
  }
  refreshPhase();
}
</script>
</body>
</html>
