# nginx config for the smash tournament frontend dashboard
# Place at: /etc/nginx/sites-available/smash.felixscherz.me
# Enable:   ln -s /etc/nginx/sites-available/smash.felixscherz.me /etc/nginx/sites-enabled/
# Cert:     certbot --nginx -d smash.felixscherz.me

server {
    listen 80;
    server_name smash.felixscherz.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name smash.felixscherz.me;

    ssl_certificate     /etc/letsencrypt/live/smash.felixscherz.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smash.felixscherz.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint for live game state feed
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }
}
