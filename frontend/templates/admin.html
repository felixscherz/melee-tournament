<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smash Tournament — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'Courier New', monospace; min-height: 100vh; }

    header {
      background: #1a1a2e;
      padding: 1.2rem 2rem;
      border-bottom: 2px solid #e94560;
      display: flex; align-items: center; gap: 1.5rem;
    }
    header h1 { font-size: 1.5rem; color: #e94560; letter-spacing: 3px; }
    nav { display: flex; gap: 0.5rem; margin-left: auto; }
    nav a {
      text-decoration: none; color: #9090c0; font-size: 0.8rem; letter-spacing: 1px;
      padding: 0.4rem 1rem; border-radius: 4px; background: #2a2a4a; transition: background 0.2s, color 0.2s;
    }
    nav a:hover { background: #35355a; color: #c0c0e0; }
    nav a.active { background: #e94560; color: #fff; }

    main { max-width: 640px; margin: 2rem auto; padding: 0 1.5rem; }

    h2 { text-align: center; font-size: 1rem; color: #6060a0; letter-spacing: 2px; margin-bottom: 1.5rem; }
    h2.sub { font-size: 0.8rem; margin-top: 2rem; }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 1.4rem;
      margin-bottom: 1.2rem;
    }

    .phase-row { display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-size: 0.9rem; }
    .phase-label { color: #6060a0; letter-spacing: 1px; }
    #phase-pill {
      padding: 0.25rem 0.9rem; border-radius: 999px; font-weight: bold; letter-spacing: 1px;
      background: #2a2a4a; color: #9090c0; text-transform: uppercase; font-size: 0.78rem;
    }
    #phase-pill.idle     { background: #223322; color: #81c784; }
    #phase-pill.starting { background: #33321a; color: #ffe082; }
    #phase-pill.in_game  { background: #3a1a24; color: #e94560; }
    #phase-pill.postgame { background: #1a2a3a; color: #4fc3f7; }

    .team-rows { display: flex; flex-direction: column; gap: 0.5rem; }
    .team-row { display: flex; align-items: center; gap: 0.6rem; font-size: 0.78rem; }
    .team-badge-sm {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: bold; flex-shrink: 0;
    }
    .p1 { background: #4fc3f7; color: #000; }
    .p2 { background: #ef9a9a; color: #000; }
    .p3 { background: #a5d6a7; color: #000; }
    .p4 { background: #ffe082; color: #000; }
    .team-row .tname { flex: 1; color: #c0c0d0; }
    .team-row .tchar { color: #9090b0; font-size: 0.72rem; }
    .team-row .tready { font-size: 0.68rem; padding: 0.15rem 0.5rem; border-radius: 8px; }
    .tready.on { color: #81c784; border: 1px solid #2a5a2a; }
    .tready.off { color: #6060a0; border: 1px solid #2a2a4a; }

    .btn {
      width: 100%; padding: 0.85rem 1rem; margin-bottom: 0.9rem;
      border: none; border-radius: 6px;
      font-family: inherit; font-size: 0.95rem; font-weight: bold; letter-spacing: 2px;
      cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-stop    { background: #e94560; color: #fff; }
    .btn-stop:hover:not(:disabled)    { background: #c73352; }
    .btn-reset   { background: #3a1a24; color: #e94560; }
    .btn-reset:hover:not(:disabled)   { background: #4a2a34; }

    #status { text-align: center; margin-top: 0.4rem; font-size: 0.82rem; color: #6060a0; min-height: 1.2rem; }
    #status.ok  { color: #81c784; }
    #status.err { color: #e94560; }
  </style>
</head>
<body>
<header>
  <h1>⚔ ADMIN</h1>
  <nav>
    <a href="/lobby">LOBBY</a>
    <a href="/watch">WATCH</a>
    <a href="/admin" class="active">ADMIN</a>
  </nav>
</header>
<main>
  <h2>MATCH CONTROL</h2>

  <div class="card">
    <div class="phase-row">
      <span class="phase-label">CURRENT PHASE</span>
      <span id="phase-pill" class="idle">—</span>
    </div>
  </div>

  <div class="card">
    <h2 class="sub" style="margin-top:0">TEAMS</h2>
    <div class="team-rows" id="team-rows"></div>
  </div>

  <div class="card">
    <button class="btn btn-stop" id="stop-btn" onclick="stopMatch()">END MATCH &amp; RETURN TO LOBBY</button>
    <button class="btn btn-reset" id="reset-btn" onclick="resetTeams()">RESET TEAMS</button>
  </div>

  <div id="status"></div>
</main>

<script>
const statusEl  = document.getElementById('status');
const pill      = document.getElementById('phase-pill');
const stopBtn   = document.getElementById('stop-btn');
const resetBtn  = document.getElementById('reset-btn');

function setStatus(msg, cls = '') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

async function refreshPhase() {
  try {
    const s = await fetch('/api/state').then(r => r.json());
    const phase = s.phase || 'idle';
    pill.textContent = phase;
    pill.className = phase;
    const idle = phase === 'idle';
    stopBtn.disabled = idle;
    resetBtn.disabled = !idle && phase !== 'postgame';
  } catch (e) {
    pill.textContent = 'unreachable';
    pill.className = '';
  }
}
refreshPhase();
setInterval(refreshPhase, 2000);

async function refreshTeams() {
  try {
    const data = await fetch('/api/teams').then(r => r.json());
    const rows = document.getElementById('team-rows');
    rows.innerHTML = '';
    for (const t of data.teams || []) {
      const row = document.createElement('div');
      row.className = 'team-row';
      row.innerHTML = `
        <div class="team-badge-sm ${t.color}">T${t.team_id}</div>
        <span class="tname">${esc(t.name)}</span>
        <span class="tchar">${esc(t.character_label)}</span>
        <span class="tready ${t.ready ? 'on' : 'off'}">${t.ready ? 'READY' : '—'}</span>
      `;
      rows.appendChild(row);
    }
  } catch (e) {}
}
refreshTeams();
setInterval(refreshTeams, 3000);

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function stopMatch() {
  stopBtn.disabled = true;
  setStatus('Ending match - bots are clearing the stage, back to the lobby shortly...', '');
  try {
    const res = await fetch('/api/stop', { method: 'POST' });
    if (!res.ok) throw new Error((await res.json()).detail || 'Error');
    setStatus('Match ending - lobby will be ready once the game wraps up.', 'ok');
  } catch (e) {
    setStatus(e.message, 'err');
  }
  refreshPhase();
}

async function resetTeams() {
  if (!confirm('Reset all teams? This clears captains, contributions, and ready state.')) return;
  try {
    const res = await fetch('/api/teams/reset', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    setStatus('Teams reset.', 'ok');
    refreshTeams();
  } catch (e) { setStatus(e.message, 'err'); }
}
</script>
</body>
</html>
